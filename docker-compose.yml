services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.docker.db
    ports:
      - "${LOGICSTARTER_DOCKER_POSTGRES_PORT:-55432}:5432"
    volumes:
      - logicstarter-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.docker.app
      - .env.docker.runtime
    environment:
      HOST: 0.0.0.0
      PORT: 5000
    ports:
      - "${LOGICSTARTER_DOCKER_APP_PORT:-5000}:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  logicstarter-postgres-data:
